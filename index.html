<!DOCTYPE html>
    <head>
        <meta charset="utf-8">
        <link href="assets\css\code.css" type="text/css" rel="stylesheet" />
        <script src="assets\js\jquery.js"></script>
        
        <title>冲子-好好学习，天天向上</title>
    </head>
    <body>
        
        <div class="card">
            <div class="front">
                <form>
                    <img src="assets\images\logo\logo.png" id="logo"/><br>
                    <div class="inputText" id="code">
                        <input type="text" id="me" required maxlength="4" title="请输入姓名">
                        <span data-placeholder="我是谁？"></span>
                    </div>
                    <input type="submit" value="verify" id="chkBtn" class="buttonCode" />
                </form>
            </div>
        </div>
        <script type="text/javascript">
            $(".inputText input").on("focus", function(){
                $(this).addClass("focus");
            });
            $(".inputText input").on("blur", function(){
                if($(this).val() == "")
                    $(this).removeClass("focus");
            });
        </script>
        <script>
            document.getElementById('chkBtn').addEventListener('click',function(){
                var me =document.getElementById("me").value;
                if (me =="高冲") {
                    window.location.href='./home.html';
                }else{
                        alert('输入错误，请重试');
                    }
            });
        </script>
    </body>
</html>
